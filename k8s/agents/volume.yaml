apiVersion: v1
kind: PersistentVolume
metadata:
  name: agents-data-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /var/lib/dev-env/agents/data
    type: DirectoryOrCreate
  storageClassName: gitea-shared
  persistentVolumeReclaimPolicy: Retain

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agents-shared-storage
  namespace: agents
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: gitea-shared