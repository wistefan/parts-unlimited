## ServiceAccount and RBAC for agent workers.
## Agents get zero Kubernetes API permissions — they cannot read secrets,
## configmaps, or interact with the cluster in any way.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-worker
  namespace: agents
automountServiceAccountToken: false

---
## The orchestrator needs permissions to manage Jobs in the agents namespace.
## This is a separate ServiceAccount with scoped permissions.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator
  namespace: agents

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orchestrator-role
  namespace: agents
rules:
  # Manage agent worker Jobs
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Read Job pod status
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Read pod logs for monitoring
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Read secrets (agent credentials)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator-binding
  namespace: agents
subjects:
  - kind: ServiceAccount
    name: orchestrator
    namespace: agents
roleRef:
  kind: Role
  name: orchestrator-role
  apiGroup: rbac.authorization.k8s.io

---
## The orchestrator needs to exec into taiga-back pods to create agent
## memberships via Django ORM (the Taiga REST API requires a "contacts"
## relationship that doesn't exist on fresh setups).

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orchestrator-taiga-role
  namespace: taiga
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator-taiga-binding
  namespace: taiga
subjects:
  - kind: ServiceAccount
    name: orchestrator
    namespace: agents
roleRef:
  kind: Role
  name: orchestrator-taiga-role
  apiGroup: rbac.authorization.k8s.io
