## Gitea Helm chart values for dev-env
## Chart: gitea-charts/gitea

# Use cached images to avoid Docker Hub rate limits on restarts
image:
  pullPolicy: IfNotPresent

# Admin user created on first startup
gitea:
  admin:
    username: claude
    password: password
    email: claude@dev-env.local

  config:
    actions:
      ENABLED: true
    repository:
      DEFAULT_DELETE_BRANCH_AFTER_MERGE: true
    server:
      ROOT_URL: http://localhost:3001
      SSH_DOMAIN: localhost
      SSH_PORT: 2222
    service:
      DISABLE_REGISTRATION: false
    webhook:
      ALLOWED_HOST_LIST: "*"

# HTTP service exposed via k3s LoadBalancer (port configurable via setup.sh)
service:
  http:
    type: LoadBalancer
    port: 3001
  ssh:
    type: LoadBalancer
    port: 2222

# Persistence for Gitea data — uses pre-provisioned hostPath PVC so data
# survives k3s reinstalls.  The PVC is created by k8s/gitea/volumes.yaml.
persistence:
  enabled: true
  create: false
  mount: true
  claimName: gitea-shared-storage
  size: 10Gi

# Bundled PostgreSQL (single-node, not HA)
postgresql:
  enabled: true
  global:
    postgresql:
      auth:
        password: gitea
        database: gitea
        username: gitea
  primary:
    persistence:
      existingClaim: gitea-postgresql-data
      size: 5Gi

postgresql-ha:
  enabled: false

# Bundled Redis (used for caching)
redis-cluster:
  enabled: false

redis:
  enabled: false

# Resource requests for local dev
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi
