## Local container registry — makes locally-built images available to k3s
## without the manual "docker save | k3s ctr images import" step.
##
## Images are pushed to localhost:5000 from Docker and pulled by k3s
## containerd via the same endpoint (hostPort).  The /etc/rancher/k3s/
## registries.yaml mirror config tells containerd to use HTTP.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
  labels:
    app: registry
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: registry:2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
              hostPort: 5000
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
          readinessProbe:
            httpGet:
              path: /v2/
              port: 5000
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: data
          hostPath:
            path: /var/lib/dev-env/registry
            type: DirectoryOrCreate
